# JANATPMP Ollama Model Configuration
# Sourced by ollama-init.sh on container startup

# Required models — pulled if missing
REQUIRED=qwen3.5:27b,qwen3.5:9b,qwen3-embedding:0.6b

# HuggingFace models — pulled if missing
HF_REQUIRED=hf.co/unsloth/Qwen3.5-27B-GGUF:Q4_K_M

# Custom models — created from Modelfiles if missing
CUSTOM=janus-27b,janus-unsloth,janus-9b

# Whitelist — models NOT on this list get removed on cleanup
# Set CLEANUP_ENABLED=true to activate (default: false for safety)
CLEANUP_ENABLED=false
WHITELIST=qwen3.5:27b,qwen3.5:9b,qwen3-embedding:0.6b,janus-27b,janus-unsloth,janus-9b
